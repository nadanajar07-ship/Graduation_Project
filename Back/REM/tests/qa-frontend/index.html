<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>REM — Chat & Calls QA</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
      pre { white-space: pre-wrap; word-break: break-word; }
    </style>
  </head>
  <body class="bg-slate-100 min-h-screen">
    <header class="bg-slate-900 text-white">
      <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between flex-wrap gap-2">
        <h1 class="font-bold">REM — Chat &amp; Calls QA</h1>
        <div class="text-xs">
          <span class="opacity-70">Base URL:</span>
          <input id="baseUrl" class="bg-slate-800 px-2 py-1 rounded ml-1 w-72" />
          <span class="opacity-70 ml-3">User:</span>
          <code id="userChip" class="bg-slate-700 px-2 py-0.5 rounded">—</code>
          <button id="logoutBtn" class="ml-2 px-2 py-1 bg-rose-600 rounded text-xs hidden">Logout</button>
        </div>
      </div>
      <nav class="bg-slate-800">
        <div class="max-w-7xl mx-auto px-4 flex gap-1 overflow-x-auto text-sm">
          <button data-page="auth"       class="nav-btn px-3 py-2 hover:bg-slate-700">1. Auth</button>
          <button data-page="rooms"      class="nav-btn px-3 py-2 hover:bg-slate-700">2. Rooms (Channels / DMs / Groups)</button>
          <button data-page="messages"   class="nav-btn px-3 py-2 hover:bg-slate-700">3. Messages (REST)</button>
          <button data-page="calls"      class="nav-btn px-3 py-2 hover:bg-slate-700">4. Calls (REST)</button>
          <button data-page="socket"     class="nav-btn px-3 py-2 hover:bg-slate-700">5. Realtime (Sockets) ⚡</button>
          <button data-page="monitoring" class="nav-btn px-3 py-2 hover:bg-slate-700">6. Monitoring (Sessions / Screenshots / Idle) 🖥</button>
        </div>
      </nav>
    </header>

    <main id="page" class="max-w-7xl mx-auto p-4"></main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
