<!-- ── Idle: Show start button ── -->
@if (ws.status() === 'idle') {
  <button class="ws-start-btn" (click)="onStart()" [disabled]="isLoading()" title="Start work session">
    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
    </svg>
    <span>Start</span>
  </button>
}

<!-- ── Active / Paused: Show timer + controls ── -->
@if (ws.status() === 'active' || ws.status() === 'paused') {
  <div class="ws-widget" [class.is-paused]="ws.isPaused()" [class.is-idle]="ws.isIdle()">

    <!-- Status dot -->
    <span class="ws-dot" [class.dot-active]="ws.isActive()" [class.dot-paused]="ws.isPaused()"></span>

    <!-- Timer -->
    <span class="ws-timer">{{ ws.formattedTime() }}</span>

    <!-- Idle indicator -->
    @if (ws.isIdle()) {
      <span class="ws-idle-badge">Idle</span>
    }

    <!-- Controls -->
    <div class="ws-controls">
      @if (ws.isActive()) {
        <!-- Pause -->
        <button class="ws-ctrl-btn" (click)="onPause()" [disabled]="isLoading()" title="Pause session">
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5"/>
          </svg>
        </button>
      } @else {
        <!-- Resume -->
        <button class="ws-ctrl-btn ws-ctrl-resume" (click)="onResume()" [disabled]="isLoading()" title="Resume session">
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"/>
          </svg>
        </button>
      }

      <!-- Stop -->
      <button class="ws-ctrl-btn ws-ctrl-stop" (click)="onStop()" [disabled]="isLoading()" title="Stop session">
        <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5.25 7.5A2.25 2.25 0 0 1 7.5 5.25h9a2.25 2.25 0 0 1 2.25 2.25v9a2.25 2.25 0 0 1-2.25 2.25h-9a2.25 2.25 0 0 1-2.25-2.25v-9Z"/>
        </svg>
      </button>
    </div>
  </div>
}

<!-- ── Stopped: brief confirmation ── -->
@if (ws.status() === 'stopped') {
  <div class="ws-stopped">
    <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path stroke-linecap="round" stroke-linejoin="round" d="m4.5 12.75 6 6 9-13.5"/>
    </svg>
    <span>Saved</span>
  </div>
}
